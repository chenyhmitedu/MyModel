gh-pages doesn't exist. where and how should I create it

You should not manually create gh-pages in most Julia workflows.

For Documenter.jl, the correct approach is:

❗ Let GitHub Actions + Documenter create and manage gh-pages for you automatically.

Why you don’t create it yourself
gh-pages is a deployment branch, not a source branch. It is:

generated from docs/build/

overwritten every time you deploy docs

not edited by hand

So if you create it manually, you’ll likely just create confusion or overwrite it later.

The correct Julia way (recommended)
Step 1: edit docs/make.jl
Make sure you have:

using Documenter
using MyModel

makedocs(
    sitename = "MyModel.jl",
    modules = [MyModel],
)

deploydocs(
    repo = "github.com/chenyhmitedu/MyModel.git",
)
Step 2: add GitHub Actions workflow
Create this file in your repo:

.github/workflows/docs.yml
with:

name: Documenter

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v1

      - run: julia --project=docs -e 'using Pkg; Pkg.instantiate()'

      - run: julia --project=docs docs/make.jl

      - uses: julia-actions/documenter@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
Step 3: push to GitHub
git add .
git commit -m "Set up docs deployment"
git push
What happens next (important)
GitHub Actions will:

Run docs/make.jl

Generate HTML in docs/build/

Automatically create/update a hidden gh-pages branch

Publish it to:

https://chenyhmitedu.github.io/MyModel/
Step 4: enable GitHub Pages
