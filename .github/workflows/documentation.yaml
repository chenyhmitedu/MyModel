Documenter is being very literal. It thinks your expected output contains an extra blank line before the function description.

For a jldoctest, the format should be:

```jldoctest
julia> using MyModel

julia> CGE_M21
CGE_M21 (generic function with 3 methods)
```
Notice there is no blank line between:

julia> CGE_M21
and

CGE_M21 (generic function with 3 methods)
The output must immediately follow the prompt.

In your docstring you likely have:

```jldoctest
julia> using MyModel

julia> CGE_M21

CGE_M21 (generic function with 3 methods)
```
with an extra blank line before the output.

That said, this example is not very useful and is causing unnecessary doctest headaches. I'd strongly recommend either:

A. Use a normal REPL example

```julia-repl
julia> using MyModel

julia> CGE_M21()
```
or

B. Remove the output entirely

# Examples

```julia
using MyModel
CGE_M21()
```
