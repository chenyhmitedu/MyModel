Great—that tells us what happened.

When you're in MyModel/ and activate docs, the active environment is MyModel/docs, but the path argument to develop is resolved relative to your current working directory, not relative to the environment. So:

(docs) pkg> develop .
means "develop the package in MyModel/", which is correct.

