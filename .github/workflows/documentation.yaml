```@autodocs
Modules = [MyModel]
```
then CGE_M21 should normally be included.

Case 2: CGE_M21 is not exported
Suppose your module looks like:

module MyModel

function CGE_M21(...)
end

end
and your index.md contains:

```@autodocs
Modules = [MyModel]
Public = true
```
or

```@autodocs
Modules = [MyModel]
Private = false
```
then non-exported names are excluded.

Check whether you have:

export CGE_M21
in your module.

Case 3: @autodocs isn't seeing the function at all
A quick test is to explicitly document it.

Replace your index.md with:

# MyModel

```@docs
CGE_M21
```
and rebuild:

include("docs/make.jl")
If that works, then the issue is with your @autodocs configuration.

Case 4: Your makedocs is enforcing coverage
You likely have something like:

makedocs(
    modules = [MyModel],
)
The modules argument tells Documenter:

Check that every docstring in MyModel appears somewhere in the manual.

That's why the build fails.

To temporarily disable the check:

