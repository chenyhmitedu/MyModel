in Julia docstrings should be enclosed by a pair of " or """?

In Julia, docstrings should be enclosed in triple quotes """ ... """, not a single pair of double quotes.

Example:

"""
Compute the square of a number.

# Arguments
- `x`: A number.

# Returns
The square of `x`.
"""
function square(x)
    x^2
end
A single pair of double quotes ("...") creates a regular string value:

s = "hello"
While Julia technically allows any string literal immediately before a definition to serve as documentation, the standard convention—and what you'll see throughout Julia's documentation and package ecosystem—is to use triple-quoted strings for docstrings because they support multi-line text cleanly.

You can then access the documentation with:

?square
in the Julia REPL help mode.






But in https://docs.julialang.org/en/v1/manual/documentation/#Functions-and-Methods-2     why the examples use "..." instead of """..."""

Good observation. The examples in the Julia manual often use single-line string literals as docstrings:

"Tell whether there are too many pigs."
too_many_pigs(pigs::Int) = pigs > 1
instead of:

"""
Tell whether there are too many pigs.
"""
too_many_pigs(pigs::Int) = pigs > 1
This works because Julia's documentation system treats any string literal immediately preceding an object definition as documentation metadata. The string doesn't have to be triple-quoted.

The manual itself states:

Any string appearing just before an object (function, macro, type, instance) will be interpreted as documenting it.

So both forms are valid:

"Add two numbers."
add(x, y) = x + y
and

"""
Add two numbers.
"""
add(x, y) = x + y
The reason you'll usually see """...""" in real packages is practical:

Supports multiple lines naturally.

Allows Markdown sections (# Arguments, # Examples, etc.).

Easier to maintain as documentation grows.

Matches the style used throughout Julia's Base and standard libraries.

A common convention is:

Short one-line docs → "..." is fine.

Anything more than one line → use """...""".

For example, these are equivalent from Julia's perspective:

"Compute a square."
square(x) = x^2
"""
Compute a square.
"""
square(x) = x^2
but if you later add examples or argument descriptions, the triple-quoted version becomes much more convenient.






