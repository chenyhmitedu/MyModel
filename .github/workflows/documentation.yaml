A couple of additional checks:

docs/make.jl
Make sure the end of the file contains:

deploydocs(
    repo = "github.com/chenyhmitedu/MyModel.git",
)
docs/Project.toml
Make sure it contains both Documenter and your package:

[deps]
Documenter = "e30172f5-a6a5-5a46-863b-614d45cd2de4"
MyModel = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
To find your package UUID, look in:

MyModel/Project.toml
for the line:

uuid = "..."
and use that value.

